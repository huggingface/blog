<svg width="1300" height="650" viewBox="0 0 1300 650" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>SkyRelic Multi-Agent Drone Delivery Environment thumbnail</title>
  <desc>A 1300x650 technical thumbnail for the SkyRelic Drone RL project</desc>

  <defs>
